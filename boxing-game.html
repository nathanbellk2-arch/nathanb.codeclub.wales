<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥊 Championship Boxing - UFC Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        .game-container {
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
            animation: titleGlow 2s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .round-info {
            font-size: 1.2em;
            color: #ffd93d;
            margin-bottom: 10px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 900px;
            margin: 0 auto 10px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            border: 1px solid rgba(255, 217, 61, 0.3);
        }

        .fighter-stats {
            text-align: center;
            flex: 1;
        }

        .fighter-name {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .player-name { color: #4ecdc4; }
        .opponent-name { color: #ff6b6b; }

        .health-bar-container {
            width: 250px;
            height: 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin: 5px auto;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .health-bar {
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease, background 0.3s ease;
        }

        .player-health {
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
            width: 100%;
        }

        .opponent-health {
            background: linear-gradient(90deg, #ff6b6b, #ee5a24);
            width: 100%;
        }

        .stamina-bar-container {
            width: 200px;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            margin: 3px auto;
            overflow: hidden;
        }

        .stamina-bar {
            height: 100%;
            background: linear-gradient(90deg, #ffd93d, #f39c12);
            border-radius: 4px;
            transition: width 0.2s ease;
        }

        .stats-text {
            font-size: 0.85em;
            color: #aaa;
            margin-top: 3px;
        }

        #gameCanvas {
            display: block;
            margin: 0 auto;
            border-radius: 15px;
            box-shadow: 0 0 60px rgba(255, 107, 107, 0.3), 0 0 120px rgba(78, 205, 196, 0.2);
            border: 3px solid rgba(255, 217, 61, 0.4);
        }

        .combo-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            font-weight: bold;
            color: #ffd93d;
            text-shadow: 0 0 20px rgba(255, 217, 61, 0.8);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .combo-display.active {
            opacity: 1;
            animation: comboPulse 0.5s ease;
        }

        @keyframes comboPulse {
            0% { transform: translate(-50%, -50%) scale(0.5); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .controls-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .control-group {
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group h3 {
            color: #ffd93d;
            margin-bottom: 8px;
            font-size: 1em;
        }

        .key {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 10px;
            border-radius: 5px;
            margin: 2px;
            font-family: monospace;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px 5px;
        }

        .btn-start {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: #fff;
        }

        .btn-restart {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: #fff;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 50px;
            border-radius: 25px;
            text-align: center;
            border: 2px solid #ffd93d;
            box-shadow: 0 0 60px rgba(255, 217, 61, 0.3);
            animation: popIn 0.3s ease;
            max-width: 500px;
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-content h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .win-text { color: #4ecdc4; }
        .lose-text { color: #ff6b6b; }
        .ko-text { 
            color: #ff0000; 
            font-size: 3em;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.8);
            animation: koFlash 0.5s ease infinite;
        }

        @keyframes koFlash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .modal-content p {
            font-size: 1.2em;
            color: #ccc;
            margin: 10px 0;
        }

        .damage-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            z-index: 5;
        }

        .damage-flash.red {
            background: radial-gradient(ellipse at center, rgba(255,0,0,0.4) 0%, transparent 70%);
            animation: flashRed 0.3s ease;
        }

        @keyframes flashRed {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .fullscreen-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1001;
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 107, 107, 0.8);
            color: #fff;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
            background: rgba(255, 107, 107, 1);
        }

        .timer-display {
            font-size: 2em;
            color: #ffd93d;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 217, 61, 0.5);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn" onclick="toggleFullscreen()" title="Toggle Fullscreen">⛶</button>

    <div class="game-container">
        <h1>🥊 CHAMPIONSHIP BOXING 🥊</h1>
        
        <div class="round-info">
            Round <span id="round">1</span> / 3 &nbsp;|&nbsp; 
            <span class="timer-display" id="timer">2:00</span>
        </div>

        <div class="stats-bar">
            <div class="fighter-stats">
                <div class="fighter-name player-name">👊 PLAYER</div>
                <div class="health-bar-container">
                    <div class="health-bar player-health" id="playerHealth"></div>
                </div>
                <div class="stamina-bar-container">
                    <div class="stamina-bar" id="playerStamina" style="width: 100%"></div>
                </div>
                <div class="stats-text">
                    Hits: <span id="playerHits">0</span> | Combos: <span id="playerCombos">0</span>
                </div>
            </div>

            <div class="fighter-stats">
                <div class="timer-display" id="timerCenter">2:00</div>
            </div>

            <div class="fighter-stats">
                <div class="fighter-name opponent-name">🤖 OPPONENT</div>
                <div class="health-bar-container">
                    <div class="health-bar opponent-health" id="opponentHealth"></div>
                </div>
                <div class="stamina-bar-container">
                    <div class="stamina-bar" id="opponentStamina" style="width: 100%"></div>
                </div>
                <div class="stats-text">
                    Hits: <span id="opponentHits">0</span> | Combos: <span id="opponentCombos">0</span>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas" width="900" height="500"></canvas>

        <div class="damage-flash" id="damageFlash"></div>
        <div class="combo-display" id="comboDisplay"></div>

        <div class="controls-info">
            <div class="control-group">
                <h3>🎯 Attacks</h3>
                <span class="key">J</span> Jab<br>
                <span class="key">K</span> Hook<br>
                <span class="key">L</span> Uppercut<br>
                <span class="key">Space</span> Block
            </div>
            <div class="control-group">
                <h3>🦶 Movement</h3>
                <span class="key">A</span> Left<br>
                <span class="key">D</span> Right<br>
                <span class="key">W</span> Forward<br>
                <span class="key">S</span> Back
            </div>
            <div class="control-group">
                <h3>⚡ Combos</h3>
                J+J+K = Triple Combo<br>
                K+L = Power Combo<br>
                J+K+L = Ultimate
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="startBtn" onclick="startGame()">🥊 FIGHT!</button>
        </div>
    </div>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <h2 id="modalTitle"></h2>
            <p id="modalMessage"></p>
            <p id="modalStats"></p>
            <br>
            <button class="btn btn-restart" onclick="closeModal(); resetGame();">🔄 Fight Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game State
        let gameRunning = false;
        let round = 1;
        let maxRounds = 3;
        let roundTime = 120; // 2 minutes per round
        let timerInterval = null;
        let roundScores = { player: 0, opponent: 0 };

        // Fighter class
        class Fighter {
            constructor(x, y, isPlayer) {
                this.x = x;
                this.y = y;
                this.isPlayer = isPlayer;
                this.health = 100;
                this.maxHealth = 100;
                this.stamina = 100;
                this.maxStamina = 100;
                this.width = 80;
                this.height = 150;
                this.speed = 4;
                this.punching = false;
                this.punchType = null;
                this.punchTimer = 0;
                this.punchDuration = 15;
                this.blocking = false;
                this.hit = false;
                this.hitTimer = 0;
                this.hitDuration = 10;
                this.facing = isPlayer ? 1 : -1;
                this.comboCount = 0;
                this.comboTimer = 0;
                this.comboWindow = 30; // frames to complete combo
                this.comboSequence = [];
                this.totalHits = 0;
                this.totalCombos = 0;
                this.knockdown = false;
                this.knockdownTimer = 0;
                this.knockdownDuration = 60;
                this.bodyColor = isPlayer ? '#4ecdc4' : '#ff6b6b';
                this.gloveColor = isPlayer ? '#44a08d' : '#ee5a24';
                this.skinColor = '#f5d6ba';
                this.shortColor = isPlayer ? '#2c3e50' : '#c0392b';
                this.armAngle = 0;
                this.targetArmAngle = 0;
                this.bobOffset = 0;
                this.bobSpeed = 0.05;
            }

            update() {
                // Stamina recovery
                if (!this.punching && !this.blocking && this.stamina < this.maxStamina) {
                    this.stamina = Math.min(this.maxStamina, this.stamina + 0.3);
                }

                // Punch timer
                if (this.punching) {
                    this.punchTimer--;
                    this.armAngle = this.targetArmAngle * (1 - this.punchTimer / this.punchDuration);
                    if (this.punchTimer <= 0) {
                        this.punching = false;
                        this.armAngle = 0;
                    }
                }

                // Hit recovery
                if (this.hit) {
                    this.hitTimer--;
                    if (this.hitTimer <= 0) {
                        this.hit = false;
                    }
                }

                // Combo timer
                if (this.comboTimer > 0) {
                    this.comboTimer--;
                    if (this.comboTimer <= 0) {
                        this.comboSequence = [];
                        this.comboCount = 0;
                    }
                }

                // Knockdown
                if (this.knockdown) {
                    this.knockdownTimer--;
                    if (this.knockdownTimer <= 0) {
                        this.knockdown = false;
                    }
                }

                // Bob animation
                this.bobOffset = Math.sin(Date.now() * this.bobSpeed) * 3;
            }

            punch(type) {
                if (this.punching || this.hit || this.knockdown) return false;
                
                const staminaCost = { jab: 8, hook: 15, uppercut: 20 };
                const cost = staminaCost[type] || 10;
                
                if (this.stamina < cost) return false;

                this.stamina -= cost;
                this.punching = true;
                this.punchType = type;
                this.punchTimer = this.punchDuration;
                
                switch(type) {
                    case 'jab': 
                        this.targetArmAngle = 0.8;
                        break;
                    case 'hook': 
                        this.targetArmAngle = 1.2;
                        break;
                    case 'uppercut': 
                        this.targetArmAngle = -0.8;
                        break;
                }

                // Track combo
                this.comboSequence.push(type);
                this.comboTimer = this.comboWindow;
                this.comboCount++;

                return true;
            }

            takeDamage(amount) {
                if (this.knockdown) return;
                
                if (this.blocking) {
                    amount *= 0.2; // 80% damage reduction when blocking
                    this.stamina -= amount * 0.5;
                }

                this.health -= amount;
                this.hit = true;
                this.hitTimer = this.hitDuration;
                this.totalHits++;

                // Chance of knockdown on heavy hits
                if (amount > 15 && Math.random() < 0.3) {
                    this.knockdown = true;
                    this.knockdownTimer = this.knockdownDuration;
                }

                if (this.health <= 0) {
                    this.health = 0;
                }
            }

            block(active) {
                if (!this.hit && !this.knockdown) {
                    this.blocking = active && this.stamina > 10;
                }
            }

            move(dx, dy) {
                if (this.hit || this.knockdown) return;
                if (this.stamina < 5 && (dx !== 0 || dy !== 0)) return;

                this.x += dx * this.speed;
                this.y += dy * this.speed;
                
                // Keep in bounds
                this.x = Math.max(50, Math.min(canvas.width - 50, this.x));
                this.y = Math.max(200, Math.min(canvas.height - 100, this.y));
                
                this.stamina -= 0.1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y + this.bobOffset);

                // Knockdown effect
                if (this.knockdown) {
                    ctx.rotate(Math.PI / 2 * this.facing);
                }

                // Hit flash
                if (this.hit) {
                    ctx.globalAlpha = 0.5 + Math.sin(this.hitTimer * 2) * 0.5;
                }

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(0, 75, 30, 10, 0, 0, Math.PI * 2);
                ctx.fill();

                // Body
                ctx.fillStyle = this.bodyColor;
                ctx.beginPath();
                ctx.ellipse(0, 10, 25, 40, 0, 0, Math.PI * 2);
                ctx.fill();

                // Head
                ctx.fillStyle = this.skinColor;
                ctx.beginPath();
                ctx.arc(0, -40, 20, 0, Math.PI * 2);
                ctx.fill();

                // Hair
                ctx.fillStyle = this.isPlayer ? '#2c3e50' : '#8B4513';
                ctx.beginPath();
                ctx.arc(0, -48, 18, Math.PI, Math.PI * 2);
                ctx.fill();

                // Eyes
                ctx.fillStyle = '#000';
                const eyeX = this.facing * 8;
                ctx.beginPath();
                ctx.arc(eyeX - 3, -42, 2, 0, Math.PI * 2);
                ctx.arc(eyeX + 3, -42, 2, 0, Math.PI * 2);
                ctx.fill();

                // Shorts
                ctx.fillStyle = this.shortColor;
                ctx.fillRect(-20, 40, 40, 25);

                // Legs
                ctx.fillStyle = this.skinColor;
                ctx.fillRect(-15, 60, 12, 30);
                ctx.fillRect(3, 60, 12, 30);

                // Gloves and arms
                ctx.save();
                ctx.translate(this.facing * 15, 0);
                ctx.rotate(this.armAngle * this.facing);
                
                // Arm
                ctx.fillStyle = this.skinColor;
                ctx.fillRect(0, -5, 30, 10);
                
                // Glove
                ctx.fillStyle = this.gloveColor;
                ctx.beginPath();
                ctx.arc(35, 0, 12, 0, Math.PI * 2);
                ctx.fill();
                
                // Glove highlight
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(32, -4, 5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();

                // Blocking shield effect
                if (this.blocking) {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, 50, -Math.PI/2, Math.PI/2);
                    ctx.stroke();
                }

                // Stamina bar above fighter
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(-30, -70, 60, 6);
                const staminaPercent = this.stamina / this.maxStamina;
                ctx.fillStyle = staminaPercent > 0.5 ? '#ffd93d' : staminaPercent > 0.25 ? '#f39c12' : '#e74c3c';
                ctx.fillRect(-30, -70, 60 * staminaPercent, 6);

                ctx.restore();
            }

            getPunchBox() {
                const punchRange = { jab: 70, hook: 60, uppercut: 55 };
                const range = punchRange[this.punchType] || 60;
                const punchX = this.x + this.facing * range;
                return {
                    x: punchX - 20,
                    y: this.y - 20,
                    width: 40,
                    height: 40
                };
            }
        }

        // Particles
        let particles = [];

        function createHitParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 5;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 2,
                    radius: 2 + Math.random() * 4,
                    color: color,
                    life: 1,
                    type: Math.random() > 0.5 ? 'spark' : 'star'
                });
            }
        }

        function createSweatParticles(x, y) {
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: x + Math.random() * 20 - 10,
                    y: y - 40,
                    vx: Math.random() * 2 - 1,
                    vy: -2 - Math.random() * 2,
                    radius: 2 + Math.random() * 2,
                    color: 'rgba(173, 216, 230, 0.7)',
                    life: 1,
                    type: 'sweat'
                });
            }
        }

        function updateParticles() {
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.15;
                p.life -= 0.03;

                if (p.life <= 0) {
                    particles.splice(index, 1);
                }
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                
                if (p.type === 'star') {
                    ctx.fillStyle = p.color;
                    drawStar(p.x, p.y, 5, p.radius, p.radius / 2);
                } else if (p.type === 'sweat') {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.ellipse(p.x, p.y, p.radius / 2, p.radius, 0, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            ctx.globalAlpha = 1;
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let step = Math.PI / spikes;
            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
                rot += step;
                ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fill();
        }

        // Create fighters
        let player, opponent;

        // Input
        let keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            
            if (gameRunning && !player.knockdown) {
                // Attack inputs
                if (e.key.toLowerCase() === 'j') {
                    if (player.punch('jab')) {
                        checkHit(player, opponent, 'jab');
                    }
                }
                if (e.key.toLowerCase() === 'k') {
                    if (player.punch('hook')) {
                        checkHit(player, opponent, 'hook');
                    }
                }
                if (e.key.toLowerCase() === 'l') {
                    if (player.punch('uppercut')) {
                        checkHit(player, opponent, 'uppercut');
                    }
                }

                // Check combos
                checkCombo(player);
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        function checkHit(attacker, defender, punchType) {
            const punchBox = attacker.getPunchBox();
            const defenderBox = {
                x: defender.x - 30,
                y: defender.y - 50,
                width: 60,
                height: 100
            };

            if (punchBox.x < defenderBox.x + defenderBox.width &&
                punchBox.x + punchBox.width > defenderBox.x &&
                punchBox.y < defenderBox.y + defenderBox.height &&
                punchBox.y + punchBox.height > defenderBox.y) {
                
                const damage = { jab: 5, hook: 12, uppercut: 18 };
                let dmg = damage[punchType] || 5;
                
                // Combo bonus
                if (attacker.comboCount > 1) {
                    dmg *= 1 + (attacker.comboCount - 1) * 0.2;
                }

                defender.takeDamage(dmg);
                
                // Visual effects
                createHitParticles(defender.x, defender.y - 20, defender.blocking ? '#aaa' : '#ff0000');
                
                if (attacker.isPlayer) {
                    showComboDisplay(`${punchType.toUpperCase()}! ${Math.round(dmg)} DMG`);
                    document.getElementById('playerHits').textContent = player.totalHits;
                } else {
                    document.getElementById('opponentHits').textContent = opponent.totalHits;
                    flashDamage();
                }

                // Sweat particles
                createSweatParticles(defender.x, defender.y);

                // Check KO
                if (defender.health <= 0) {
                    endRound(attacker.isPlayer ? 'player' : 'opponent');
                }
            }
        }

        function checkCombo(fighter) {
            const seq = fighter.comboSequence;
            let comboName = '';
            
            if (seq.length >= 3) {
                const last3 = seq.slice(-3).join(',');
                if (last3 === 'jab,jab,hook') {
                    comboName = '⚡ TRIPLE COMBO!';
                    fighter.totalCombos++;
                } else if (seq.slice(-2).join(',') === 'hook,uppercut') {
                    comboName = '💥 POWER COMBO!';
                    fighter.totalCombos++;
                } else if (last3 === 'jab,hook,uppercut') {
                    comboName = '🔥 ULTIMATE COMBO!';
                    fighter.totalCombos++;
                }
            }

            if (comboName) {
                showComboDisplay(comboName);
                if (fighter.isPlayer) {
                    document.getElementById('playerCombos').textContent = fighter.totalCombos;
                } else {
                    document.getElementById('opponentCombos').textContent = fighter.totalCombos;
                }
            }
        }

        function showComboDisplay(text) {
            const display = document.getElementById('comboDisplay');
            display.textContent = text;
            display.classList.add('active');
            setTimeout(() => display.classList.remove('active'), 1000);
        }

        function flashDamage() {
            const flash = document.getElementById('damageFlash');
            flash.classList.remove('red');
            void flash.offsetWidth;
            flash.classList.add('red');
        }

        // AI Opponent
        function updateAI() {
            if (!gameRunning || opponent.knockdown) return;

            const dist = Math.abs(player.x - opponent.x);
            const attackRange = 100;

            // Movement
            if (dist > attackRange + 20) {
                opponent.move(opponent.facing * 1, 0);
            } else if (dist < attackRange - 30) {
                opponent.move(-opponent.facing * 1, 0);
            }

            // Random movement
            if (Math.random() < 0.02) {
                opponent.move(0, (Math.random() - 0.5) * 2);
            }

            // Attack logic
            if (dist < attackRange && Math.random() < 0.03 && !opponent.punching) {
                const rand = Math.random();
                let attackType;
                if (rand < 0.5) attackType = 'jab';
                else if (rand < 0.8) attackType = 'hook';
                else attackType = 'uppercut';

                if (opponent.punch(attackType)) {
                    checkHit(opponent, player, attackType);
                    checkCombo(opponent);
                }
            }

            // Block when player is attacking
            if (player.punching && dist < attackRange && Math.random() < 0.4) {
                opponent.block(true);
            } else {
                opponent.block(false);
            }
        }

        // Draw ring
        function drawRing() {
            // Ring floor
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(30, 180, canvas.width - 60, canvas.height - 180);

            // Ring canvas texture
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width - 60; i += 20) {
                ctx.beginPath();
                ctx.moveTo(30 + i, 180);
                ctx.lineTo(30 + i, canvas.height - 180);
                ctx.stroke();
            }

            // Ropes
            const ropeColors = ['#e74c3c', '#ecf0f1', '#e74c3c'];
            ropeColors.forEach((color, i) => {
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(30, 200 + i * 40);
                ctx.lineTo(canvas.width - 30, 200 + i * 40);
                ctx.stroke();
            });

            // Corner posts
            const posts = [[30, 180], [canvas.width - 30, 180], [30, canvas.height - 180], [canvas.width - 30, canvas.height - 180]];
            posts.forEach(([px, py]) => {
                ctx.fillStyle = '#c0392b';
                ctx.fillRect(px - 8, py - 10, 16, canvas.height - 180 + 20);
            });

            // Crowd silhouettes
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            for (let i = 0; i < 20; i++) {
                const cx = 50 + i * 45;
                const cy = 160 + Math.sin(i * 0.5) * 10;
                ctx.beginPath();
                ctx.arc(cx, cy, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillRect(cx - 10, cy + 15, 20, 20);
            }

            // Spotlights
            const gradient = ctx.createRadialGradient(canvas.width / 2, 100, 0, canvas.width / 2, 100, 300);
            gradient.addColorStop(0, 'rgba(255, 255, 200, 0.1)');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Update UI
        function updateUI() {
            document.getElementById('playerHealth').style.width = player.health + '%';
            document.getElementById('opponentHealth').style.width = opponent.health + '%';
            document.getElementById('playerStamina').style.width = player.stamina + '%';
            document.getElementById('opponentStamina').style.width = opponent.stamina + '%';

            // Health bar color changes
            const playerHealthBar = document.getElementById('playerHealth');
            const opponentHealthBar = document.getElementById('opponentHealth');
            
            if (player.health < 30) {
                playerHealthBar.style.background = 'linear-gradient(90deg, #e74c3c, #c0392b)';
            } else if (player.health < 60) {
                playerHealthBar.style.background = 'linear-gradient(90deg, #f39c12, #e67e22)';
            }

            if (opponent.health < 30) {
                opponentHealthBar.style.background = 'linear-gradient(90deg, #e74c3c, #c0392b)';
            } else if (opponent.health < 60) {
                opponentHealthBar.style.background = 'linear-gradient(90deg, #f39c12, #e67e22)';
            }

            // Timer
            const minutes = Math.floor(roundTime / 60);
            const seconds = roundTime % 60;
            const timeStr = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('timer').textContent = timeStr;
            document.getElementById('timerCenter').textContent = timeStr;
        }

        // Timer
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameRunning) return;
                roundTime--;
                if (roundTime <= 0) {
                    endRound('time');
                }
            }, 1000);
        }

        // End round
        function endRound(result) {
            gameRunning = false;
            if (timerInterval) clearInterval(timerInterval);

            if (result === 'time') {
                // Judge by health
                if (player.health > opponent.health) {
                    result = 'player';
                } else if (opponent.health > player.health) {
                    result = 'opponent';
                } else {
                    result = 'draw';
                }
            }

            if (result === 'player') {
                roundScores.player++;
            } else if (result === 'opponent') {
                roundScores.opponent++;
            }

            // Check if match is over
            if (round >= maxRounds || roundScores.player >= 2 || roundScores.opponent >= 2) {
                endMatch();
            } else {
                // Next round
                round++;
                document.getElementById('round').textContent = round;
                setTimeout(() => {
                    resetRound();
                    startGame();
                }, 2000);
            }
        }

        function endMatch() {
            const modal = document.getElementById('gameModal');
            const title = document.getElementById('modalTitle');
            const message = document.getElementById('modalMessage');
            const stats = document.getElementById('modalStats');

            if (roundScores.player > roundScores.opponent) {
                title.textContent = '🏆 YOU WIN! 🏆';
                title.className = 'win-text';
                message.textContent = 'Congratulations! You are the Champion!';
            } else if (roundScores.opponent > roundScores.player) {
                title.textContent = '💀 YOU LOSE 💀';
                title.className = 'lose-text';
                message.textContent = 'The opponent defeated you!';
            } else {
                title.textContent = '🤝 DRAW 🤝';
                title.className = '';
                message.textContent = "It's a draw!";
            }

            stats.innerHTML = `
                Rounds Won: ${roundScores.player} - ${roundScores.opponent}<br>
                Total Hits: ${player.totalHits} | Combos: ${player.totalCombos}<br>
                Opponent Hits: ${opponent.totalHits} | Combos: ${opponent.totalCombos}
            `;

            modal.classList.add('active');
        }

        // Reset round
        function resetRound() {
            player = new Fighter(250, 300, true);
            opponent = new Fighter(650, 300, false);
            roundTime = 120;
            particles = [];
            updateUI();
        }

        // Game loop
        function gameLoop() {
            if (!gameRunning) return;

            // Clear
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw ring
            drawRing();

            // Update
            player.update();
            opponent.update();
            updateAI();
            updateParticles();

            // Handle player movement
            if (!player.knockdown && !player.hit) {
                let dx = 0, dy = 0;
                if (keys['a'] || keys['arrowleft']) dx = -1;
                if (keys['d'] || keys['arrowright']) dx = 1;
                if (keys['w'] || keys['arrowup']) dy = -1;
                if (keys['s'] || keys['arrowdown']) dy = 1;
                player.move(dx, dy);
            }

            // Blocking
            player.block(keys[' ']);

            // Draw fighters (opponent first for depth)
            if (player.x < opponent.x) {
                player.draw();
                opponent.draw();
            } else {
                opponent.draw();
                player.draw();
            }

            // Draw particles
            drawParticles();

            // Update UI
            updateUI();

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            if (gameRunning) return;
            gameRunning = true;
            document.getElementById('startBtn').textContent = '🥊 Fighting...';
            document.getElementById('startBtn').disabled = true;
            startTimer();
            gameLoop();
        }

        function resetGame() {
            round = 1;
            roundScores = { player: 0, opponent: 0 };
            document.getElementById('round').textContent = round;
            resetRound();
            document.getElementById('startBtn').textContent = '🥊 FIGHT!';
            document.getElementById('startBtn').disabled = false;
            document.getElementById('playerHits').textContent = '0';
            document.getElementById('playerCombos').textContent = '0';
            document.getElementById('opponentHits').textContent = '0';
            document.getElementById('opponentCombos').textContent = '0';
            
            // Draw initial state
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawRing();
            player.draw();
            opponent.draw();
        }

        function closeModal() {
            document.getElementById('gameModal').classList.remove('active');
        }

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                document.getElementById('fullscreenBtn').style.display = 'none';
            } else {
                document.getElementById('fullscreenBtn').style.display = 'block';
            }
        });

        // Initialize
        resetGame();
    </script>
</body>
</html>
